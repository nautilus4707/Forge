version: "3.8"

services:
  forge:
    build: .
    ports:
      - "127.0.0.1:8626:8626"
    volumes:
      - ./forgefile.yaml:/app/forgefile.yaml:ro
      - forge-workspace:/app/forge_workspace
      - forge-data:/app/.forge
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - forge-network

  dashboard:
    build: ./dashboard
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8626
    depends_on:
      - forge
    networks:
      - forge-network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD:-changeme}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    # Not exposed to host -- only accessible within the Docker network
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - forge-network

volumes:
  forge-workspace:
  forge-data:
  redis-data:

networks:
  forge-network:
    driver: bridge
